name: Kamus Bahasa Moy - CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install UV
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Setup Python
        run: uv python install 3.13

      - name: Install Node Dependencies
        run: pnpm install

      - name: Install Python Dependencies
        run: cd apps/api && uv sync --dev

      - name: Run Quality Checks & Tests
        run: pnpm check:all
