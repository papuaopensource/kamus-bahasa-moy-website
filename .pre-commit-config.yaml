repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: pnpm --filter @kamus-bahasa-moy/api lint
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: pnpm --filter @kamus-bahasa-moy/api format
        language: system
        types: [python]
        require_serial: true
        pass_filenames: false

      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        types_or:
          [
            javascript,
            jsx,
            ts,
            tsx,
            css,
            scss,
            html,
            json,
            yaml,
            markdown,
            astro,
          ]
        require_serial: true
